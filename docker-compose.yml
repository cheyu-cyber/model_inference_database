services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  upload:
    build: .
    command: python services/upload_service.py
    ports:
      - "8001:8001"
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      UPLOAD_STORAGE_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      redis:
        condition: service_healthy

  inference:
    build: .
    command: python services/inference_service.py
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  docdb:
    build: .
    command: python services/document_db_service.py
    ports:
      - "8003:8003"
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: model_inference
      MONGO_COLLECTION: documents
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  embedding:
    build: .
    command: python services/embedding_service.py
    ports:
      - "8004:8004"
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  vector:
    build: .
    command: python services/vector_service.py
    ports:
      - "8005:8005"
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  web:
    build: .
    command: python services/web_service.py
    ports:
      - "8000:8000"
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      UPLOAD_SERVICE_URL: http://upload:8001
      DOCDB_SERVICE_URL: http://docdb:8003
      EMBEDDING_SERVICE_URL: http://embedding:8004
      VECTOR_SERVICE_URL: http://vector:8005
    depends_on:
      - upload
      - docdb
      - embedding
      - vector

volumes:
  uploads:
  mongo_data:
