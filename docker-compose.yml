services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  inference:
    build: .
    command: python services/inference_service.py
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  docdb:
    build: .
    command: python services/document_db_service.py
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: model_inference
      MONGO_COLLECTION: documents
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  embedding:
    build: .
    command: python services/embedding_service.py
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  vector:
    build: .
    command: python services/vector_service.py
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  web:
    build: .
    command: python services/web_service.py
    ports:
      - "8000:8000"
    environment:
      BUS_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      UPLOAD_STORAGE_DIR: /data/uploads
      BUS_REQUEST_TIMEOUT: "5.0"
    volumes:
      - uploads:/data/uploads
    depends_on:
      redis:
        condition: service_healthy

volumes:
  uploads:
  mongo_data:
